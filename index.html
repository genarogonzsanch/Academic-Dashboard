<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<meta
  name="viewport"
  content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
><title>Academic Dashboard</title>
<link rel="stylesheet" href="style.css">
<link rel="icon" href="icons/icon-192.png" type="image/png">
<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#111111">

<meta name="apple-mobile-web-app-capable" content="yes">

<meta name="mobile-web-app-capable" content="yes">

<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<meta name="apple-mobile-web-app-title" content="Academic Dashboard">
</head>
<body>

<header class="header">
  <h1>Academic Dashboard</h1>

  <button
   id="settingsBtn"
   type="button"
   aria-label="Configuración"
  >
   <i data-lucide="settings" class="icon"></i>
  </button>

</header>

<section id="onboarding" class="card">

  <div class="wizard-progress">
    <div class="wizard-progress-track">
      <div class="wizard-progress-bar" id="wizardProgressBar"></div>
    </div>
    <div class="wizard-progress-label" id="wizardProgressLabel"></div>
  </div>

  <div id="wizardStepContent"></div>

  <div class="wizard-nav" id="wizardNav">
    <button id="wizardBackBtn" type="button">Atrás</button>
    <button id="wizardSkipBtn" type="button">Saltar</button>
    <button id="wizardNextBtn" type="button">Comenzar</button>
  </div>

</section>

<main
 class="container"
 id="appContent">

  <section id="homeScreen">
    <section id="dashboard"></section>
  </section>

  <section
   id="subjectsScreen"
   style="display:none"
  >

    <section id="careerHeader"></section>

    <div class="materias-search-wrap">

      <i data-lucide="search" class="icon materias-search-icon"></i>

      <input
       type="text"
       id="materiasSearchInput"
       placeholder="Buscar materia..."
       autocomplete="off"
      >

    </div>

    <section id="materias"></section>
  </section>

  <section
   id="calendarScreen"
   style="display:none"
  >

    <section class="card">

      <div class="calendar-view-toggle">

        <button id="calendarViewMonthBtn" type="button" class="active">
          Mes
        </button>

        <button id="calendarViewWeekBtn" type="button">
          Semana
        </button>

      </div>

      <div class="calendar-header">

        <button id="prevMonth" aria-label="Mes anterior">
          <i data-lucide="chevron-left" class="icon"></i>
        </button>

        <h2 id="calendarTitle">
          Calendario
        </h2>

        <button id="nextMonth" aria-label="Mes siguiente">
          <i data-lucide="chevron-right" class="icon"></i>
        </button>

      </div>

      <div id="calendar"></div>

    </section>

  </section>

  <section
   id="classSpaceScreen"
   style="display:none"
  >

    <section class="card">

      <div class="cs-header">

        <button
         id="classSpaceBackBtn"
         type="button"
         aria-label="Volver"
        >
         <i data-lucide="chevron-left" class="icon"></i>
        </button>

        <h2 id="classSpaceTitle">Materia</h2>

      </div>

    </section>

    <section class="card" id="classSpaceNotes"></section>

    <section class="card" id="classSpaceTasks"></section>

  </section>

  <section
   id="notesSubjectsScreen"
   style="display:none"
  >

    <section class="card">

      <div class="cs-header">

        <button
         id="notesSubjectsBackBtn"
         type="button"
         aria-label="Volver"
        >
         <i data-lucide="chevron-left" class="icon"></i>
        </button>

        <h2>Tomar notas</h2>

      </div>

    </section>

    <section class="card">

      <div id="notesSubjectsList"></div>

    </section>

  </section>

</main>

<div
 id="updateBanner"
 class="update-banner hidden"
>

 <span class="update-banner-text">
  <i data-lucide="sparkles" class="icon"></i>
  Hay una nueva versión disponible.
 </span>

 <button
  id="updateNowBtn"
  type="button"
 >
  Actualizar ahora
 </button>

</div>

<nav class="bottom-nav">

 <button class="nav-btn active" data-screen="home">
  <span class="nav-icon-wrap" aria-hidden="true"><i data-lucide="home" class="icon"></i></span>
  <span>Inicio</span>
 </button>

 <button class="nav-btn" data-screen="calendar">
  <span class="nav-icon-wrap" aria-hidden="true"><i data-lucide="calendar" class="icon"></i></span>
  <span>Calendario</span>
 </button>

 <button class="nav-btn" data-screen="subjects">
  <span class="nav-icon-wrap" aria-hidden="true"><i data-lucide="graduation-cap" class="icon"></i></span>
  <span>Carrera</span>
 </button>

</nav>

<div
 id="settingsModal"
 class="modal hidden"
>

 <div class="modal-content">

  <div class="modal-header">

   <h2>Configuración</h2>

   <button
    type="button"
    class="modal-close"
    aria-label="Cerrar"
   >
    <i data-lucide="x" class="icon"></i>
   </button>

  </div>

  <div class="modal-body">

   <p>
    Podés volver a ejecutar el tutorial
    de bienvenida cuando quieras.
   </p>

   <button
    id="restartTutorialBtn"
    type="button"
   >
    <i data-lucide="rotate-ccw" class="icon"></i>
    Reiniciar tutorial
   </button>

   <button
    id="installAppBtn"
    type="button"
    class="hidden"
   >
    <i data-lucide="smartphone" class="icon"></i>
    Instalar Academic Dashboard
   </button>

   <p
    id="installSuccessMsg"
    class="hidden"
   >
    <i data-lucide="check-circle" class="icon"></i>
    ¡Academic Dashboard se instaló correctamente!
   </p>

  </div>

 </div>

</div>

<div
 id="modalHorario"
 class="modal hidden"
>

 <div class="modal-content">

  <div class="modal-header">

   <h2>
    Configurar horario
   </h2>

   <button
    type="button"
    class="modal-close"
    aria-label="Cerrar"
   >
    <i data-lucide="x" class="icon"></i>
   </button>

  </div>

  <div class="modal-body">

  <input
   type="hidden"
   id="materiaHorarioId"
  >

  <input
 type="hidden"
 id="editingScheduleId"
>
  <label><i data-lucide="book-open" class="icon"></i>Materia</label>

  <input
   id="materiaHorarioNombre"
   readonly
  >

  <label>
 Modalidad
</label>

<select id="classMode">

 <option value="presencial">
  🏫 Presencial
 </option>

 <option value="virtual">
  💻 Virtual
 </option>

 <option value="mixta">
  🔄 Mixta
 </option>

</select>

  <label>
   Día
  </label>

  <select id="weekday">

   <option value="1">
    Lunes
   </option>

   <option value="2">
    Martes
   </option>

   <option value="3">
    Miércoles
   </option>

   <option value="4">
    Jueves
   </option>

   <option value="5">
    Viernes
   </option>

   <option value="6">
    Sábado
   </option>

   <option value="0">
    Domingo
   </option>

  </select>

  <div class="form-row">

   <div class="form-field">

    <label>
     Hora inicio
    </label>

    <input
     type="time"
     id="startTime"
    >

   </div>

   <div class="form-field">

    <label>
     Hora fin
    </label>

    <input
     type="time"
     id="endTime"
    >

   </div>

  </div>

  <div class="form-row">

   <div class="form-field">

    <label>
     Fecha inicio
    </label>

    <input
     type="date"
     id="startDate"
    >

   </div>

   <div class="form-field">

    <label>
     Fecha fin
    </label>

    <input
     type="date"
     id="endDate"
    >

   </div>

  </div>

  </div>

  <div
   class="modal-actions"
  >

   <button
    id="saveScheduleBtn"
   >
    Guardar
   </button>

   <button
    id="closeScheduleBtn"
   >
    Cancelar
   </button>

  </div>

 </div>

</div>



<div
 id="dayEventsModal"
 class="modal hidden"
>

 <div class="modal-content">

  <div class="modal-header">

   <h2 id="dayEventsTitle">
    Eventos
   </h2>

   <button
    type="button"
    class="modal-close"
    aria-label="Cerrar"
   >
    <i data-lucide="x" class="icon"></i>
   </button>

  </div>

  <div class="modal-body">

  <div id="dayEventsList">
  </div>

  </div>

  <div class="modal-actions">

   <button
    id="newEventBtn"
   >
    <i data-lucide="plus" class="icon"></i>
    Nuevo Evento
   </button>

   <button
    id="closeDayEventsBtn"
   >
    Cerrar
   </button>

  </div>

 </div>

</div>

<div
 id="eventModal"
 class="modal hidden"
>

 <div class="modal-content">

  <div class="modal-header">

   <h2>
    Nuevo Evento
   </h2>

   <button
    type="button"
    class="modal-close"
    aria-label="Cerrar"
   >
    <i data-lucide="x" class="icon"></i>
   </button>

  </div>

  <div class="modal-body">

  <input
   type="hidden"
   id="eventDate"
  >

  <input
 type="hidden"
 id="editingEventId"
>

  <label>
   Tipo
  </label>

  <select id="eventType">

   <option value="parcial">
    Parcial
   </option>

   <option value="final">
    Final
   </option>

   <option value="recuperatorio">
    Recuperatorio
   </option>

   <option value="tp">
    Entrega TP
   </option>

   <option value="presentacion">
    Presentación
   </option>

   <option value="personalizado">
    Personalizado
   </option>

  </select>

<label>
 Materia
</label>

<input
 type="text"
 id="eventMateriaSearch"
 placeholder="Buscar materia..."
 autocomplete="off"
>

<input
 type="hidden"
 id="eventMateria"
>

<div
 id="eventMateriaResults"
 class="autocomplete-results"
></div>
  <div class="form-row">

   <div class="form-field">

    <label>
     Hora inicio
    </label>

    <input
     type="time"
     id="eventStart"
    >

   </div>

   <div class="form-field">

    <label>
     Hora fin
    </label>

    <input
     type="time"
     id="eventEnd"
    >

   </div>

  </div>

  <label>
   Observaciones
  </label>

  <input
   id="eventObs"
   placeholder="Opcional"
  >

  </div>

  <div class="modal-actions">

   <button
    id="saveEventBtn"
   >
    Guardar
   </button>

   <button
    id="closeEventBtn"
   >
    Cancelar
   </button>

  </div>

 </div>

</div>


<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

<script src="js/core/storage.js"></script>

<script src="js/plans/psychology.js"></script>
<script src="js/plans/plans-registry/plans-registry.js"></script>

<script src="js/core/migration.js"></script>

<script src="js/dash/dashboard.js"></script>

<script src="js/subjects/materias.js"></script>
<script src="js/subjects/class-space.js"></script>

<script src="js/calendar/eventos.js"></script>
<script src="js/calendar/calendario.js"></script>
<script src="js/calendar/calendario-ui.js"></script>
<script src="js/calendar/calendar-view.js"></script>

<script src="js/navigation/navigation.js"></script>

<script src="js/onboarding/onboarding.js"></script>

<script src="js/core/mobile.js"></script>

<script src="js/core/pwa.js"></script>

<script src="js/core/app.js"></script>

<script>
  if (typeof lucide !== "undefined") {
    lucide.createIcons();
  }
</script>
</body>
</html>
